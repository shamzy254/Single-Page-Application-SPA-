<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple SPA Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">SPA Lab</div>
    <nav class="nav-bar">
      <button class="nav-button active" data-page="home">Home</button>
      <button class="nav-button" data-page="todos">Todos</button>
      <button class="nav-button" data-page="create">Create Post</button>
    </nav>
  </header>

  <main class="container">
    <section id="content" class="content-area"></section>
  </main>

  <footer class="footer-bar">
    <span>Interactive SPA practice with event listeners, fetch, and DOM updates.</span>
  </footer>

  <template id="home-template">
    <div class="page-panel">
      <h1>Welcome to the SPA Lab</h1>
      <p>Use the navigation buttons to load content dynamically without refreshing the page.</p>
      <div class="home-grid">
        <article class="info-card">
          <h2>Event Listeners</h2>
          <p>Buttons and forms respond instantly when users interact with them.</p>
        </article>
        <article class="info-card">
          <h2>Fetch API</h2>
          <p>Retrieve data from external services and update the page in real time.</p>
        </article>
        <article class="info-card">
          <h2>DOM Manipulation</h2>
          <p>HTML and CSS are updated by JavaScript to create a seamless user experience.</p>
        </article>
      </div>
      <button id="load-quote" class="primary-button">Load an Inspirational Quote</button>
      <div id="quote-output" class="quote-output"></div>
    </div>
  </template>

  <template id="todos-template">
    <div class="page-panel">
      <h1>Todos</h1>
      <p>Fetch sample todos from an API and update the list below.</p>
      <div class="todo-panel">
        <button id="fetch-todos" class="primary-button">Fetch Todos</button>
        <button id="clear-todos" class="secondary-button">Clear Todos</button>
      </div>
      <ul id="todo-list" class="todo-list"></ul>
      <div id="todos-status" class="status-message"></div>
    </div>
  </template>

  <template id="create-template">
    <div class="page-panel">
      <h1>Create Post</h1>
      <p>Submit the form to send a POST request and display the response.</p>
      <form id="create-form" class="create-form">
        <label>
          Title
          <input type="text" id="post-title" name="title" placeholder="Post title" required />
        </label>
        <label>
          Body
          <textarea id="post-body" name="body" placeholder="Post content" required></textarea>
        </label>
        <button type="submit" class="primary-button">Submit Post</button>
      </form>
      <div id="create-response" class="response-card"></div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
